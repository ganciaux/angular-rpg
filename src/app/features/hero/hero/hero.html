@let heroData = hero();

<h1>Hero</h1>
<p>Edit: <input (input)="updateName($event)" [value]="heroData.name"/></p>
<p>Name: {{ heroData.name }}</p>
<p>
  HP: {{ heroData.hp }} {{ status() }}
</p>
<button (click)="updateHp(-10)">Take Damage</button>
<button (click)="updateHp(10)">Heal</button>
<div class="hp-bar">
  <div class="hp-bar-fill" [class.danger]="heroData.hp < 30" [style.width.%]="hpPercent()"></div>
</div>

<p>Level: {{ heroData.level }}</p>

<p>Stats:</p>
<ul>
  @for (stat of statList; track stat) {
    <li>{{ stat }}: {{ heroData.stats[stat] }}</li>
  }
</ul>
