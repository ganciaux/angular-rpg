@let heroData = hero();

<h1>Hero</h1>
<p>Name: {{ hero().name}}</p>
<p>HP: 
    @if (hero().hp <= 0){
    💀 Héros mort
    } @else {
        {{ hero().hp }}
    }
</p>

<p>Level: {{ hero().level }}</p>

<p>Stats:</p>
<ul>
    @for(stat of statList; track stat){
        <li>{{ stat }}: {{ heroData.stats[stat] }}</li>
    }
</ul>
